.11.12" class="markmap-node" transform="translate(544, -28.6875)"><line stroke="#1f77b4" stroke-width="1.375" x1="-1" x2="209" y1="20.6875" y2="20.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="191" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">SQL (PostgreSQL/MySQL)</div></div></foreignObject></g><g data-depth="3" data-path="1.11.13" class="markmap-node" transform="translate(544, -2.3125)"><line stroke="#ff7f0e" stroke-width="1.375" x1="-1" x2="114" y1="20.6875" y2="20.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="96" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">CTEs (WITH)</div></div></foreignObject></g><g data-depth="3" data-path="1.11.14" class="markmap-node" transform="translate(544, 24.0625)"><line stroke="#2ca02c" stroke-width="1.375" x1="-1" x2="62" y1="20.6875" y2="20.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="44" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">JOINs</div></div></foreignObject></g><g data-depth="3" data-path="1.11.15" class="markmap-node" transform="translate(544, 50.4375)"><line stroke="#d62728" stroke-width="1.375" x1="-1" x2="414" y1="20.6875" y2="20.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="396" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Funciones de agregación: SUM, AVG, COUNT, ROUND</div></div></foreignObject></g><g data-depth="2" data-path="1.11" class="markmap-node" transform="translate(336, 10.875)"><line stroke="#17becf" stroke-width="1.75" x1="-1" x2="130" y1="20.875" y2="20.875"/><circle stroke-width="1.5" r="6" stroke="#17becf" fill="var(--markmap-circle-open-bg)" cx="128" cy="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="112" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">🛠️ Tecnologías</div></div></foreignObject></g><g data-depth="3" data-path="1.16.17" class="markmap-node" transform="translate(565, 81.8125)"><line stroke="#bcbd22" stroke-width="1.375" x1="-1" x2="584" y1="407.6875" y2="407.6875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="566" height="407"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml"><pre data-lines="30,51"><code class="language-sql"><span class="hljs-keyword">WITH</span> plan_stats <span class="hljs-keyword">AS</span> (
    <span class="hljs-keyword">SELECT</span> 
        o.subscription_id,
        <span class="hljs-built_in">COUNT</span>(<span class="hljs-keyword">DISTINCT</span> o.customer_id) <span class="hljs-keyword">AS</span> clientes_unicos,
        <span class="hljs-built_in">SUM</span>(s.price_per_month <span class="hljs-operator">*</span> <span class="hljs-built_in">CAST</span>(s.subscription_length <span class="hljs-keyword">AS</span> <span class="hljs-type">INT</span>)) <span class="hljs-keyword">AS</span> ingresos_totales,
        <span class="hljs-built_in">AVG</span>(s.price_per_month <span class="hljs-operator">*</span> <span class="hljs-built_in">CAST</span>(s.subscription_length <span class="hljs-keyword">AS</span> <span class="hljs-type">INT</span>)) <span class="hljs-keyword">AS</span> ticket_promedio,
        <span class="hljs-built_in">AVG</span>(<span class="hljs-built_in">CAST</span>(s.subscription_length <span class="hljs-keyword">AS</span> <span class="hljs-type">INT</span>)) <span class="hljs-keyword">AS</span> duracion_promedio_meses
    <span class="hljs-keyword">FROM</span> orders o
    <span class="hljs-keyword">JOIN</span> subscriptions s <span class="hljs-keyword">ON</span> o.subscription_id <span class="hljs-operator">=</span> s.subscription_id
    <span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> o.subscription_id
)
<span class="hljs-keyword">SELECT</span> 
    s.description,
    ps.clientes_unicos,
    ps.ingresos_totales,
    ROUND(ps.ticket_promedio, <span class="hljs-number">2</span>) <span class="hljs-keyword">AS</span> ticket_promedio, 
    ROUND(ps.duracion_promedio_meses, <span class="hljs-number">2</span>) <span class="hljs-keyword">AS</span> duracion_promedio_meses
<span class="hljs-keyword">FROM</span> plan_stats ps
<span class="hljs-keyword">JOIN</span> subscriptions s <span class="hljs-keyword">ON</span> ps.subscription_id <span class="hljs-operator">=</span> s.subscription_id
<span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> ps.ingresos_totales <span class="hljs-keyword">DESC</span>;</code></pre></div></div></foreignObject></g><g data-depth="2" data-path="1.16" class="markmap-node" transform="translate(336, 275.3125)"><line stroke="#7f7f7f" stroke-width="1.75" x1="-1" x2="151" y1="20.875" y2="20.875"/><circle stroke-width="1.5" r="6" stroke="#7f7f7f" fill="var(--markmap-circle-open-bg)" cx="149" cy="20.875"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="133" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">📊 Query principal</div></div></foreignObject></g><g data-depth="1" data-path="1" class="markmap-node" transform="translate(0, -10)"><line stroke="#1f77b4" stroke-width="2.5" x1="-1" x2="258" y1="21.25" y2="21.25"/><circle stroke-width="1.5" r="6" stroke="#1f77b4" fill="var(--markmap-circle-open-bg)" cx="256" cy="21.25"/><foreignObject class="markmap-foreign" x="8" y="0" style="opacity: 1;" width="240" height="20"><div xmlns="http://www.w3.org/1999/xhtml"><div xmlns="http://www.w3.org/1999/xhtml">Análisis de Planes de Suscripción</div></div></foreignObject></g></g></svg>